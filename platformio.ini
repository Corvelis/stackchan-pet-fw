; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = m5stack-cores3

[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_16mb_ota_4m_littlefs_7m.csv
board_build.filesystem = littlefs

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D UART_SCLK_DEFAULT=UART_SCLK_APB
  -D STACKCHAN_DEVICE_CORES3=1
  -D STACKCHAN_HAS_STACKCHAN_BSP=1
  -D STACKCHAN_HAS_SERVO=1
  -D STACKCHAN_HAS_CAMERA=1
  -D STACKCHAN_HAS_BACK_TOUCH=1
  -D STACKCHAN_HAS_SCREEN_TOUCH_PETTING=0
  -D STACKCHAN_HAS_HAPTIC=0
  -D STACKCHAN_ROUND_DISPLAY=0
  -std=gnu++17

build_unflags =
  -std=gnu++11

lib_deps =
  m5stack/M5Unified
  m5stack/M5GFX
  bblanchon/ArduinoJson
  h2zero/NimBLE-Arduino
  https://github.com/m5stack/StackChan-BSP.git

[env:m5stack-cores3-release]
extends = env:m5stack-cores3
build_flags =
  ${env:m5stack-cores3.build_flags}
  -D STACKCHAN_RELEASE_BUILD=1

[env:m5stack-stopwatch]
platform = espressif32 @ 6.12.0
board = esp32s3box
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_8mb_app2560k_littlefs5504k.csv
board_build.filesystem = littlefs
board_upload.flash_size = 8MB
board_upload.maximum_size = 2621440
board_build.arduino.memory_type = qio_opi
extra_scripts =
  pre:scripts/use_stopwatch_data_dir.py

build_flags =
  -D ESP32S3
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D UART_SCLK_DEFAULT=UART_SCLK_APB
  -D STACKCHAN_DEVICE_STOPWATCH=1
  -D STACKCHAN_DEVICE_CORES3=0
  -D STACKCHAN_HAS_STACKCHAN_BSP=0
  -D STACKCHAN_HAS_SERVO=0
  -D STACKCHAN_HAS_CAMERA=0
  -D STACKCHAN_HAS_BACK_TOUCH=0
  -D STACKCHAN_HAS_SCREEN_TOUCH_PETTING=1
  -D STACKCHAN_HAS_HAPTIC=1
  -D STACKCHAN_ROUND_DISPLAY=1
  -std=gnu++17

build_unflags =
  -std=gnu++11

lib_deps =
  https://github.com/m5stack/M5Unified.git
  https://github.com/m5stack/M5GFX.git
  bblanchon/ArduinoJson
  h2zero/NimBLE-Arduino
  https://github.com/m5stack/M5PM1.git
  https://github.com/m5stack/M5IOE1.git

[env:m5stack-stopwatch-release]
extends = env:m5stack-stopwatch
build_flags =
  ${env:m5stack-stopwatch.build_flags}
  -D STACKCHAN_RELEASE_BUILD=1

[env:m5stack-atoms3r-chatbot]
platform = espressif32 @ 6.12.0
board = m5stack-atoms3r
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_8mb_no_ota_littlefs_3m.csv
board_build.filesystem = littlefs
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.arduino.memory_type = qio_opi
extra_scripts =
  pre:scripts/use_atoms3r_data_dir.py

build_flags =
  -D ESP32S3
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D UART_SCLK_DEFAULT=UART_SCLK_APB
  -D STACKCHAN_DEVICE_ATOMS3R_CHATBOT=1
  -D STACKCHAN_DEVICE_CORES3=0
  -D STACKCHAN_DEVICE_STOPWATCH=0
  -D STACKCHAN_HAS_STACKCHAN_BSP=0
  -D STACKCHAN_HAS_SERVO=0
  -D STACKCHAN_HAS_CAMERA=0
  -D STACKCHAN_HAS_BACK_TOUCH=0
  -D STACKCHAN_HAS_SCREEN_TOUCH_PETTING=0
  -D STACKCHAN_HAS_HAPTIC=0
  -D STACKCHAN_ROUND_DISPLAY=0
  -D STACKCHAN_SMALL_DISPLAY=1
  -D STACKCHAN_IMU_PETTING=0
  -D STACKCHAN_HAS_ATOMIC_ECHO_BASE=1
  -std=gnu++17

build_unflags =
  -std=gnu++11

lib_deps =
  https://github.com/m5stack/M5Unified.git
  https://github.com/m5stack/M5GFX.git
  bblanchon/ArduinoJson
  h2zero/NimBLE-Arduino

[env:m5stack-atoms3r-chatbot-release]
extends = env:m5stack-atoms3r-chatbot
build_flags =
  ${env:m5stack-atoms3r-chatbot.build_flags}
  -D STACKCHAN_RELEASE_BUILD=1
