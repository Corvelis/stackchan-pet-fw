; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_16mb_ota_4m_littlefs_7m.csv
board_build.filesystem = littlefs

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D UART_SCLK_DEFAULT=UART_SCLK_APB
  -std=gnu++17

build_unflags =
  -std=gnu++11

lib_deps =
  m5stack/M5Unified
  m5stack/M5GFX
  bblanchon/ArduinoJson
  h2zero/NimBLE-Arduino
  https://github.com/m5stack/StackChan-BSP.git

[env:m5stack-cores3-release]
extends = env:m5stack-cores3
build_flags =
  ${env:m5stack-cores3.build_flags}
  -D STACKCHAN_RELEASE_BUILD=1
